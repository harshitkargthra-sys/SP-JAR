<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homixo Cover Export</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
        }

        /* This is the high-res cover for your PDF */
        .pdf-cover {
            width: 800px;
            /* High Resolution Width */
            height: 1131px;
            /* A4 Ratio */
            background: linear-gradient(135deg, #1B4332 0%, #081C15 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px 60px;
            text-align: center;
            color: white;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
        }

        .brand-label {
            font-size: 1.2rem;
            letter-spacing: 6px;
            font-weight: 800;
            color: #D8F3DC;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 7rem;
            line-height: 0.9;
            margin-bottom: 20px;
            text-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .main-title i {
            font-weight: 300;
            font-family: 'Playfair Display', serif;
        }

        .divider {
            height: 4px;
            width: 80px;
            background: #D8F3DC;
            margin: 40px auto;
        }

        .book-type {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1.8rem;
            line-height: 1.4;
            color: #D8F3DC;
            font-weight: 400;
            opacity: 0.9;
            max-width: 80%;
            margin: 0 auto;
        }

        .footer {
            font-size: 1.2rem;
            font-weight: 600;
            opacity: 0.5;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div class="pdf-cover">
        <div class="brand-label">Homixo Special Edition</div>

        <div>
            <div class="main-title">Sprout<br><i>Flow</i></div>
            <div class="divider"></div>
            <div class="book-type">Recipe Book</div>
        </div>

        <div>
            <div class="tagline">
                Master the Art of Wellness.<br>From Seed to Superfood in 48 Hours.
            </div>
            <div style="margin-top: 60px;" class="footer">© 2026 HOMIXO INTERNATIONAL</div>
        </div>
    </div>

</body>

</html>
